name: agentprdiff

on:
  pull_request:
    paths:
      - "agent/**"
      - "tools/**"
      - "config.py"
      - "suites/**"
      - "requirements.txt"
      - ".github/workflows/agentprdiff.yml"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install coursenotes-ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install agentprdiff
        # While agentprdiff is pre-release, install from GitHub. Pin to the
        # branch you want; switch to `pip install agentprdiff` once 0.2 is on
        # PyPI.
        run: |
          pip install "agentprdiff @ git+https://github.com/vnageshwaran-de/agentprdiff@feat/sdk-adapters"

      - name: agentprdiff check
        env:
          LLM_PROVIDER: groq
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_MODEL: llama-3.3-70b-versatile
        run: |
          if [ -z "${LLM_API_KEY}" ]; then
            echo "::warning::GROQ_API_KEY secret not set — skipping agentprdiff check."
            exit 0
          fi
          agentprdiff check suites/coursenotes.py --json-out artifacts/agentprdiff.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentprdiff-trace
          path: |
            artifacts/
            .agentprdiff/runs/
