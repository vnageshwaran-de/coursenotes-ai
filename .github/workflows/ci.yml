name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linter
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short
        env:
          LLM_PROVIDER: groq
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OUTPUT_DIR: ./output
          COOKIE_BROWSER: firefox
